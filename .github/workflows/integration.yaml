name: Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  libvirt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: |
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://get.opentofu.org/opentofu.gpg | sudo tee /etc/apt/keyrings/opentofu.gpg >/dev/null
          curl -fsSL https://packages.opentofu.org/opentofu/tofu/gpgkey | sudo gpg --no-tty --batch --dearmor -o /etc/apt/keyrings/opentofu-repo.gpg >/dev/null
          sudo chmod a+r /etc/apt/keyrings/opentofu.gpg /etc/apt/keyrings/opentofu-repo.gpg
          echo \
            "deb [signed-by=/etc/apt/keyrings/opentofu.gpg,/etc/apt/keyrings/opentofu-repo.gpg] https://packages.opentofu.org/opentofu/tofu/any/ any main
          deb-src [signed-by=/etc/apt/keyrings/opentofu.gpg,/etc/apt/keyrings/opentofu-repo.gpg] https://packages.opentofu.org/opentofu/tofu/any/ any main" \
            | sudo tee /etc/apt/sources.list.d/opentofu.list > /dev/null
          sudo chmod a+r /etc/apt/sources.list.d/opentofu.list
          sudo apt update
          sudo apt install -y tofu libvirt-daemon-system qemu-kvm

      - name: Start libvirt
        run: |
          sudo usermod -aG libvirt $USER
          sudo systemctl start libvirtd
          sudo virsh net-start default || true
          sudo virsh pool-define-as default dir --target /var/lib/libvirt/images
          sudo virsh pool-start default

      - name: Build gjoll
        run: go build -o gjoll ./cmd/gjoll

      - name: Provision VM
        run: sg libvirt -c './gjoll up examples/fedora-libvirt.tf'

      - name: Verify list shows the sandbox
        run: |
          ./gjoll list | grep fedora-libvirt

      - name: Verify status shows details
        run: |
          ./gjoll status fedora-libvirt | grep 'Name:.*fedora-libvirt'
          ./gjoll status fedora-libvirt | grep 'Status:.*running'
          ./gjoll status fedora-libvirt | grep 'User:.*fedora'

      - name: Verify SSH access
        run: |
          ssh -F ~/.local/share/gjoll/instances/fedora-libvirt/ssh_config \
            fedora-libvirt uname -a

      - name: Test cp upload and download
        run: |
          echo "gjoll-test-content" > /tmp/gjoll-upload.txt
          ./gjoll cp fedora-libvirt /tmp/gjoll-upload.txt :/tmp/gjoll-upload.txt
          ./gjoll cp fedora-libvirt :/tmp/gjoll-upload.txt /tmp/gjoll-download.txt
          diff /tmp/gjoll-upload.txt /tmp/gjoll-download.txt

      - name: Test git push and pull
        run: |
          # Create a local git repo to push
          git init /tmp/gjoll-test-repo
          cd /tmp/gjoll-test-repo
          git config user.email "test@test.com"
          git config user.name "Test"
          echo "hello from gjoll" > README.md
          git add README.md
          git commit -m "initial commit"

          # Push to the VM (use absolute path to gjoll binary)
          $GITHUB_WORKSPACE/gjoll push fedora-libvirt

          # Verify the file landed on the VM
          ssh -F ~/.local/share/gjoll/instances/fedora-libvirt/ssh_config \
            fedora-libvirt cat ~/project/README.md | grep "hello from gjoll"

          # Create a commit on the VM side
          ssh -F ~/.local/share/gjoll/instances/fedora-libvirt/ssh_config \
            fedora-libvirt bash -c 'cd ~/project && git config user.email "vm@test.com" && git config user.name "VM" && echo "vm change" >> README.md && git add README.md && git commit -m "vm commit"'

          # Pull changes back
          $GITHUB_WORKSPACE/gjoll pull fedora-libvirt
          git show gjoll/fedora-libvirt:README.md | grep "vm change"

      - name: Tear down
        if: always()
        run: sg libvirt -c './gjoll down fedora-libvirt' || true

      - name: Verify sandbox is gone after down
        if: always()
        run: |
          ! ./gjoll status fedora-libvirt 2>/dev/null
